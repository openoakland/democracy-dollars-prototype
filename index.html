<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Democracy Dollars Prototype</title>
  <style>
    :root {
      --green: #087238;
      --green-dark: #065f2f;
      --ink: #202124;
      --muted: #5f6368;
      --blue: #28546a;
      --surface: #f3f7f5;
      --card: #f1f4f3;
      --border: #d7dada;
      --disabled: #b8bbbe;
      --focus: #0b57d0;
      --danger: #a50e0e;
      --white: #fff;
      --shadow: 0 -4px 18px rgba(0,0,0,.12);
      --radius: 14px;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font);
      color: var(--ink);
      background: #e7e7e7;
      line-height: 1.45;
    }

    a { color: var(--blue); font-weight: 700; }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
    }

    :focus-visible {
      outline: 4px solid var(--focus);
      outline-offset: 3px;
    }

    .phone-shell {
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--white);
      position: relative;
      overflow-x: hidden;
    }

    .testing-banner {
      background: #111;
      color: #fff;
      font-size: .85rem;
      padding: .65rem 1rem;
      text-align: center;
    }

    .skip-link {
      position: absolute;
      left: 1rem;
      top: -100px;
      background: #fff;
      color: #000;
      padding: .75rem 1rem;
      z-index: 10;
      border: 2px solid #000;
    }

    .skip-link:focus {
      top: 1rem;
    }

    header {
      padding: 1.5rem 1.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1;
    }

    .brand span {
      display: block;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .02em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .language-button,
    .menu-button {
      border: 0;
      background: transparent;
      color: var(--ink);
      font-weight: 700;
      padding: .4rem;
      display: inline-flex;
      align-items: center;
      gap: .25rem;
    }

    .menu-icon {
      display: block;
      width: 28px;
      height: 18px;
      border-top: 4px solid #000;
      border-bottom: 4px solid #000;
      position: relative;
    }

    .menu-icon::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 5px;
      border-top: 4px solid #000;
    }

    main {
      padding: 1.25rem 1.5rem 8rem;
    }

    .hero {
      background: var(--surface);
      margin: 0 -1.5rem 1.5rem;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-size: clamp(2.45rem, 10vw, 3.6rem);
      line-height: 1.08;
      letter-spacing: -.055em;
      margin: 0 0 1rem;
    }

    h2 {
      font-size: 1.65rem;
      line-height: 1.15;
      letter-spacing: -.035em;
      margin: 0 0 1rem;
    }

    p {
      color: var(--muted);
      font-size: 1.35rem;
      margin: 0 0 1.25rem;
    }

    .small-copy {
      font-size: 1rem;
    }

    .back-button {
      border: 0;
      background: transparent;
      color: var(--green);
      font-weight: 800;
      font-size: 1.45rem;
      padding: .25rem 0;
      margin: 0 0 2.25rem;
    }

    .choice-list {
      display: grid;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .choice-card {
      width: 100%;
      text-align: left;
      border: 0;
      border-radius: var(--radius);
      background: var(--card);
      padding: 1.15rem 1.1rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .5rem;
      align-items: center;
      color: var(--ink);
    }

    .choice-card strong {
      display: block;
      font-size: 1.25rem;
      margin-bottom: .25rem;
    }

    .choice-card span {
      display: block;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.35;
    }

    .chevron {
      font-size: 2rem;
      font-weight: 800;
    }

    .field-group {
      margin: 0 0 1.45rem;
    }

    label {
      display: block;
      font-size: 1.25rem;
      margin-bottom: .5rem;
      color: var(--ink);
    }

    .required {
      color: var(--danger);
      font-weight: 800;
    }

    input[type="text"] {
      width: 100%;
      border: 2px solid #8c8f91;
      border-radius: 10px;
      min-height: 54px;
      padding: .75rem 1rem;
      font-size: 1.2rem;
    }

    .button-primary,
    .button-secondary {
      width: 100%;
      border-radius: 12px;
      min-height: 64px;
      font-size: 1.2rem;
      font-weight: 800;
      border: 0;
      padding: 1rem;
      margin-top: 1rem;
    }

    .button-primary {
      background: var(--green);
      color: #fff;
    }

    .button-primary:hover {
      background: var(--green-dark);
    }

    .button-primary:disabled {
      background: var(--disabled);
      color: #fff;
    }

    .button-secondary {
      background: transparent;
      color: var(--green);
      min-height: 48px;
    }

    .info-card {
      background: var(--card);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.25rem;
    }

    .info-card p {
      font-size: 1.2rem;
      color: #3c4043;
      margin-bottom: 1rem;
    }

    .info-card strong {
      display: block;
      margin-bottom: .35rem;
    }

    .candidate-search {
      margin: 1.5rem 0 1rem;
    }

    .accordion-button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 1.1rem;
      background: var(--card);
      font-weight: 800;
      font-size: 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .75rem;
    }

    .candidate-list {
      display: grid;
      gap: .85rem;
      margin: .75rem 0 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .candidate-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: .75rem;
    }

    .candidate-row a {
      font-size: 1.15rem;
    }

    .amount {
      font-size: 1.15rem;
      min-width: 42px;
      text-align: right;
    }

    .amount-button {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-size: 1.7rem;
      line-height: 1;
      font-weight: 700;
    }

    .amount-button:disabled {
      background: #eef1f0;
      color: #a8abad;
    }

    .sticky-summary {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(430px, 100vw);
      background: #fff;
      border-radius: 18px 18px 0 0;
      box-shadow: var(--shadow);
      padding: 1rem 1.5rem 1.25rem;
      z-index: 5;
    }

    .sticky-summary p {
      font-size: 1.2rem;
      color: var(--muted);
      margin: 0;
    }

    .sticky-summary strong {
      color: var(--ink);
    }

    .review-button {
      margin-top: .9rem;
    }

    .totals {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      margin-top: 1rem;
    }

    .total-line {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-size: 1.25rem;
      margin-bottom: .3rem;
    }

    .total-line strong {
      font-weight: 900;
    }

    .checkbox-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: .8rem;
      margin: 1.5rem 0;
      align-items: start;
    }

    .checkbox-row input {
      width: 28px;
      height: 28px;
      margin-top: .15rem;
      accent-color: var(--green);
    }

    .checkbox-row label {
      font-size: 1.15rem;
      line-height: 1.45;
      margin: 0;
    }

    .success-icon {
      font-size: 3rem;
      color: var(--green);
      margin-bottom: 1rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    .hidden { display: none !important; }

    @media (min-width: 760px) {
      .phone-shell {
        max-width: 900px;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
      }

      .sticky-summary {
        width: min(900px, 100vw);
        padding-left: calc((100vw - 760px) / 2);
        padding-right: calc((100vw - 760px) / 2);
      }
    }
  </style>
</head>
<body>
  <div class="phone-shell">
    <a href="#main" class="skip-link">Skip to main content</a>
    <div class="testing-banner">Prototype for research only. Do not enter real personal information.</div>

    <header aria-label="Site header">
      <div class="brand" aria-label="City of Oakland"><span>CITY OF</span>OAKLAND</div>
      <div class="header-actions">
        <button class="language-button" type="button" aria-label="Change language, currently English">🌐 English⌄</button>
        <button class="menu-button hidden" type="button" aria-label="Open menu"><span class="menu-icon" aria-hidden="true"></span><span class="sr-only">Menu</span></button>
      </div>
    </header>

    <main id="main" tabindex="-1"></main>
    <div id="summary" class="sticky-summary hidden" aria-label="Donation summary"></div>
    <div id="announcements" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  </div>

  <script>
    const state = {
      screen: 'idFork',
      userName: 'Dani Villar',
      donations: {
        claire: 0,
        john: 0,
        rae: 0,
        sec: 0,
        ted: 0
      },
      certified: false,
      form: {
        dob: '',
        id: '',
        ssn: ''
      }
    };

    const candidates = [
      { id: 'claire', name: 'Claire Claireson', office: 'School Board District 2' },
      { id: 'john', name: 'John Johnson', office: 'School Board District 2' },
      { id: 'rae', name: 'Rae Raeson', office: 'School Board District 2' },
      { id: 'sec', name: 'Sec Chell', office: 'Citywide' },
      { id: 'ted', name: 'Ted Boots', office: 'Citywide' }
    ];

    const main = document.getElementById('main');
    const summary = document.getElementById('summary');
    const announcements = document.getElementById('announcements');

    function totalAssigned() {
      return Object.values(state.donations).reduce((sum, value) => sum + value, 0);
    }

    function remaining() {
      return 100 - totalAssigned();
    }

    function announce(message) {
      announcements.textContent = '';
      setTimeout(() => announcements.textContent = message, 20);
    }

    function go(screen) {
      state.screen = screen;
      render();
      window.scrollTo(0, 0);
      main.focus();
    }

    function back() {
      const previous = {
        findRegistration: 'idFork',
        registrationFound: 'findRegistration',
        verifyIdentity: 'idFork',
        verificationSuccess: 'verifyIdentity',
        donate: 'registrationFound',
        review: 'donate',
        thankYou: 'donate'
      };
      go(previous[state.screen] || 'idFork');
    }

    function updateDonation(id, delta) {
      const candidate = candidates.find(c => c.id === id);
      const current = state.donations[id];
      const next = current + delta;
      if (next < 0) return;
      if (delta > 0 && remaining() < 25) return;
      state.donations[id] = next;
      render();
      announce(`${candidate.name} donation updated to $${next}. Total assigned: $${totalAssigned()} of $100.`);
    }

    function candidateRows(ids = ['claire', 'john', 'rae']) {
      return ids.map(id => {
        const c = candidates.find(item => item.id === id);
        const amount = state.donations[id];
        return `
          <div class="candidate-row">
            <a href="#" onclick="event.preventDefault(); announce('Candidate profile for ${c.name} is not included in this prototype.');">${c.name}</a>
            <button class="amount-button" type="button" ${amount === 0 ? 'disabled' : ''}
              aria-label="Remove $25 from ${c.name}. Current donation: $${amount}."
              onclick="updateDonation('${id}', -25)">−</button>
            <span class="amount" aria-label="Current donation to ${c.name}: $${amount}">$${amount}</span>
            <button class="amount-button" type="button" ${remaining() === 0 ? 'disabled' : ''}
              aria-label="Add $25 to ${c.name}. Current donation: $${amount}."
              onclick="updateDonation('${id}', 25)">+</button>
          </div>
        `;
      }).join('');
    }

    function selectedDonationRows() {
      return candidates
        .filter(c => state.donations[c.id] > 0)
        .map(c => `
          <div class="candidate-row">
            <a href="#" onclick="event.preventDefault();">${c.name}</a>
            <button class="amount-button" type="button" aria-label="Remove $25 from ${c.name}. Current donation: $${state.donations[c.id]}." onclick="updateDonation('${c.id}', -25)">−</button>
            <span class="amount" aria-label="Current donation to ${c.name}: $${state.donations[c.id]}">$${state.donations[c.id]}</span>
            <button class="amount-button" type="button" ${remaining() === 0 ? 'disabled' : ''} aria-label="Add $25 to ${c.name}. Current donation: $${state.donations[c.id]}." onclick="updateDonation('${c.id}', 25)">+</button>
          </div>
        `).join('');
    }

    function renderSummary(showReviewButton = true) {
      if (state.screen !== 'donate') {
        summary.classList.add('hidden');
        summary.innerHTML = '';
        return;
      }
      summary.classList.remove('hidden');
      summary.innerHTML = `
        <p><strong>$${totalAssigned()}</strong> of $100 assigned</p>
        ${showReviewButton && totalAssigned() > 0 ? '<button class="button-primary review-button" type="button" onclick="go(\'review\')">Review</button>' : ''}
      `;
    }

    function pageBackButton() {
      return `<button class="back-button" type="button" onclick="back()">← Back</button>`;
    }

    function render() {
      document.querySelector('.menu-button').classList.toggle('hidden', !['donate', 'review', 'thankYou'].includes(state.screen));
      summary.classList.add('hidden');

      if (state.screen === 'idFork') {
        main.innerHTML = `
          ${pageBackButton()}
          <h1>ID Verification</h1>
          <p>Registered voters and residents who are at least 18 years old can participate in the Democracy Dollars Program.</p>
          <div class="choice-list" aria-label="Choose verification path">
            <button class="choice-card" type="button" onclick="go('findRegistration')">
              <span><strong>I’m a registered voter</strong></span><span class="chevron" aria-hidden="true">›</span>
            </button>
            <button class="choice-card" type="button" onclick="go('verifyIdentity')">
              <span><strong>I’m an Oakland resident</strong><span>Citizens not registered to vote, U.S. nationals, and permanent residents</span></span><span class="chevron" aria-hidden="true">›</span>
            </button>
            <button class="choice-card" type="button" onclick="announce('Linked contact flow is not included in this prototype.')">
              <span><strong>I’ve linked my contact</strong><span>For those who have previously linked their email or phone to Democracy Dollars</span></span><span class="chevron" aria-hidden="true">›</span>
            </button>
          </div>
        `;
      }

      if (state.screen === 'findRegistration') {
        main.innerHTML = `
          ${pageBackButton()}
          <h1>Find your registration</h1>
          <p>Enter your Alameda County voter information to continue. This information is only used to verify your eligibility and will not be saved.</p>
          <form onsubmit="event.preventDefault(); go('registrationFound');">
            <div class="field-group">
              <label for="dob">Date of birth (mm/dd/yyyy) <span class="required" aria-hidden="true">*</span></label>
              <input id="dob" name="dob" type="text" inputmode="numeric" autocomplete="bday" required aria-required="true" value="${state.form.dob}" oninput="state.form.dob = this.value" />
            </div>
            <div class="field-group">
              <label for="id-number">California Driver License or ID <span class="required" aria-hidden="true">*</span></label>
              <input id="id-number" name="id-number" type="text" autocomplete="off" required aria-required="true" value="${state.form.id}" oninput="state.form.id = this.value" />
            </div>
            <div class="field-group">
              <label for="ssn">Last 4 digits of Social Security <span class="required" aria-hidden="true">*</span></label>
              <input id="ssn" name="ssn" type="text" inputmode="numeric" maxlength="4" autocomplete="off" required aria-required="true" value="${state.form.ssn}" oninput="state.form.ssn = this.value" />
            </div>
            <button class="button-primary" type="submit">Find your registration</button>
          </form>
        `;
      }

      if (state.screen === 'registrationFound') {
        main.innerHTML = `
          <h1>We found your registration</h1>
          <section class="info-card" aria-label="Registration details">
            <p><strong>Name and address</strong>DANI VILLAR<br>1234 LAKE MERRITT BLVD<br>OAKLAND, CA 94610</p>
            <p><strong>Date of birth</strong>March 11, 1973</p>
            <p><strong>Voter registration date</strong>August 23, 2017</p>
            <p><strong>You are registered as a permanent vote by mail voter and your party is non-partisan.</strong></p>
          </section>
          <p class="small-copy">If any of this information is incorrect, please update your voter profile with Alameda County at <a href="#" onclick="event.preventDefault();">acgov.org</a></p>
          <button class="button-primary" type="button" onclick="go('donate')">Go to donations</button>
          <button class="button-secondary" type="button" onclick="announce('Link account flow is not included in this prototype.')">Link contact info for easier access</button>
        `;
      }

      if (state.screen === 'verifyIdentity') {
        main.innerHTML = `
          ${pageBackButton()}
          <h1>Verify your identity</h1>
          <p>To continue, you will need to show proof of your identity and residence in Oakland.</p>
          <p>Examples of proof include:</p>
          <ul>
            <li>California State Driver’s License or ID card</li>
            <li>U.S. Government-issued photo ID or green card</li>
            <li>Mail, bill, or rental agreement showing your Oakland address</li>
          </ul>
          <button class="button-primary" type="button" onclick="go('verificationSuccess')">Verify with third-party site</button>
          <button class="button-secondary" type="button" onclick="announce('Verify through mail flow is not included in this prototype.')">Verify through mail</button>
        `;
      }

      if (state.screen === 'verificationSuccess') {
        main.innerHTML = `
          <h1>Congratulations, Dani!</h1>
          <p>You’ve verified your identity. You can now start donating your Democracy Dollars.</p>
          <button class="button-primary" type="button" onclick="go('donate')">Go to donations</button>
          <button class="button-secondary" type="button" onclick="announce('Link contact flow is not included in this prototype.')">Link contact info for easier access</button>
        `;
      }

      if (state.screen === 'donate') {
        main.innerHTML = `
          <section class="hero">
            <p class="small-copy"><strong>Welcome, ${state.userName}</strong></p>
            <h1>Donate your 2028 Democracy Dollars</h1>
            <p>Use the search bar or expand each office to find candidates you’d like to support. <strong>Please note that all candidates will not be listed until July.</strong></p>
          </section>
          <label class="sr-only" for="candidate-search">Search by candidate or office</label>
          <input id="candidate-search" class="candidate-search" type="text" placeholder="Search by candidate or office" aria-label="Search by candidate or office" />
          <button class="accordion-button" type="button" aria-expanded="false" onclick="announce('Citywide section is collapsed in this prototype.')">Citywide <span aria-hidden="true">⌃</span></button>
          <button class="accordion-button" type="button" aria-expanded="false" onclick="announce('City Council section is collapsed in this prototype.')">City Council <span aria-hidden="true">⌃</span></button>
          <button class="accordion-button" type="button" aria-expanded="true">School Board <span aria-hidden="true">⌄</span></button>
          <h2>District 2</h2>
          <div class="candidate-list" aria-label="School Board District 2 candidates">
            ${candidateRows(['claire', 'john', 'rae'])}
          </div>
          <h2>District 6</h2>
          <div class="candidate-list" aria-label="School Board District 6 candidates">
            ${candidateRows(['sec', 'ted'])}
          </div>
        `;
        renderSummary(true);
      }

      if (state.screen === 'review') {
        const hasDonations = totalAssigned() > 0;
        main.innerHTML = `
          <section class="hero">
            <h1>Confirm Donation</h1>
            <p>Please note that all candidates will not be listed until July.</p>
          </section>
          ${pageBackButton()}
          <p>Double-check your donations. Any donations made cannot be canceled or transferred.</p>
          <section aria-label="Selected donations">
            ${hasDonations ? selectedDonationRows() : '<p>No donations selected yet.</p>'}
          </section>
          <div class="totals" aria-label="Donation totals">
            <div class="total-line"><strong>Total donations</strong><strong>$${totalAssigned()}</strong></div>
            <div class="total-line"><span>Remaining donations</span><span>$${remaining()}</span></div>
          </div>
          <div class="checkbox-row">
            <input id="certify" type="checkbox" ${state.certified ? 'checked' : ''} onchange="state.certified = this.checked; render(); announce(this.checked ? 'Certification checked. Confirm and donate button is now enabled.' : 'Certification unchecked. Confirm and donate button is disabled.');" />
            <label for="certify">I am donating these Democracy Dollars voluntarily, free from threat, and not in return for payment. Once donated, Democracy Dollars can’t be canceled or transferred to another candidate.</label>
          </div>
          <button class="button-primary" type="button" ${state.certified && hasDonations ? '' : 'disabled'} onclick="go('thankYou')">Confirm and Donate</button>
        `;
      }

      if (state.screen === 'thankYou') {
        const rows = candidates.filter(c => state.donations[c.id] > 0).map(c => `
          <div class="total-line"><a href="#" onclick="event.preventDefault();">${c.name}</a><span>$${state.donations[c.id]}</span></div>
        `).join('');
        main.innerHTML = `
          <section class="hero">
            <div class="success-icon" aria-hidden="true">✓</div>
            <h1>Thank You for Donating</h1>
            <p>Your participation makes a difference. Stay tuned for updates on the 2028 elections.</p>
          </section>
          <section aria-label="Donation receipt">
            ${rows}
            <div class="totals">
              <div class="total-line"><strong>Total donations</strong><strong>$${totalAssigned()}</strong></div>
              <div class="total-line"><span>Remaining donations</span><span>$${remaining()}</span></div>
            </div>
          </section>
          <button class="button-primary" type="button" onclick="go('idFork')">Return to Homepage</button>
          <button class="button-secondary" type="button" onclick="announce('A confirmation receipt has been sent to your contact information on file.')">Send Receipt</button>
        `;
      }
    }

    render();
  </script>
</body>
</html>
